<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rutas en Barco</title>
    <meta name="description" content="Control de disponibilidad de plazas en barco en tiempo real">
    <meta name="theme-color" content="#0a2540">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Rutas Barco">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Rutas%20en%20Barco%22,%22short_name%22:%22Barco%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230a2540%22,%22theme_color%22:%22%230a2540%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛵</text></svg>%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]}">
    <style>
        :root {
            --navy:    #0a2540;
            --navy2:   #163860;
            --teal:    #00b4d8;
            --teal2:   #0096c7;
            --sea:     #90e0ef;
            --sand:    #f8f4ef;
            --text:    #0d1b2a;
            --text2:   #4a5568;
            --border:  #dde3ec;
            --card:    #ffffff;
            --bg:      #f0f4f8;
            --green:   #0d9e6e;
            --greenb:  #e6f7f2;
            --amber:   #d97706;
            --amberb:  #fef3c7;
            --red:     #dc2626;
            --redb:    #fee2e2;
            --radius:  14px;
            --shadow:  0 2px 12px rgba(10,37,64,.08);
            --shadow2: 0 8px 32px rgba(10,37,64,.14);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --navy:   #0a2540;
                --navy2:  #163860;
                --sand:   #111d2e;
                --text:   #e8edf3;
                --text2:  #8ea4bf;
                --border: #1e3352;
                --card:   #142035;
                --bg:     #0d1b2e;
                --greenb: #0d2e22;
                --amberb: #2d1f07;
                --redb:   #2d0f0f;
            }
        }

        :root[data-theme="light"] {
            --sand:   #f0f4f8;
            --text:   #0d1b2a;
            --text2:  #4a5568;
            --border: #dde3ec;
            --card:   #ffffff;
            --bg:     #f0f4f8;
            --greenb: #e6f7f2;
            --amberb: #fef3c7;
            --redb:   #fee2e2;
        }

        :root[data-theme="dark"] {
            --sand:   #111d2e;
            --text:   #e8edf3;
            --text2:  #8ea4bf;
            --border: #1e3352;
            --card:   #142035;
            --bg:     #0d1b2e;
            --greenb: #0d2e22;
            --amberb: #2d1f07;
            --redb:   #2d0f0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ── HEADER ── */
        .app-header {
            background: linear-gradient(160deg, var(--navy) 0%, var(--navy2) 60%, #1a4a7a 100%);
            color: white;
            padding: 20px 20px 28px;
            position: relative;
            overflow: hidden;
        }

        .app-header::before {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 28px;
            background: var(--bg);
            border-radius: 28px 28px 0 0;
        }

        .header-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 760px;
            margin: 0 auto;
        }

        .header-icon {
            font-size: 36px;
            line-height: 1;
            filter: drop-shadow(0 2px 6px rgba(0,180,216,.5));
        }

        .header-text h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -.3px;
        }

        .header-text p {
            font-size: 13px;
            opacity: .7;
            margin-top: 2px;
        }

        /* ── TABS ── */
        .tabs-bar {
            background: var(--bg);
            max-width: 760px;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            gap: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 11px 6px 9px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            border-bottom: 3px solid transparent;
            transition: color .2s, border-color .2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            line-height: 1.2;
        }

        .tab-btn .tab-icon { font-size: 18px; }

        .tab-btn.active {
            color: var(--teal2);
            border-bottom-color: var(--teal2);
        }

        /* ── CONTENT ── */
        .content { display: none; }
        .content.active { display: block; }

        .inner {
            max-width: 760px;
            margin: 0 auto;
            padding: 20px 16px 100px;
        }

        /* ── SECTION TITLE ── */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 16px;
        }

        /* ── DATE SELECTOR ── */
        .date-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .date-row label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
        }

        .date-input {
            padding: 9px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--card);
            color: var(--text);
            transition: border-color .2s;
        }

        .date-input:focus {
            outline: none;
            border-color: var(--teal);
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 36px 20px;
            color: var(--text2);
            font-size: 14px;
            background: var(--card);
            border-radius: var(--radius);
            border: 2px dashed var(--border);
            margin-bottom: 16px;
        }

        .empty-state p { margin-bottom: 16px; }

        /* ── TURNO CARD ── */
        .turnos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
            margin-bottom: 16px;
        }

        .turno-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .turno-card-head {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
            color: white;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .turno-hora {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -.3px;
        }

        .turno-barcos-badge {
            background: rgba(255,255,255,.15);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .turno-body { padding: 14px; }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .field-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text2);
            margin-bottom: 5px;
        }

        .field-group input {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            transition: border-color .2s;
            font-variant-numeric: tabular-nums;
        }

        .field-group input:focus {
            outline: none;
            border-color: var(--teal);
            background: var(--card);
        }

        /* ── PLAZAS METER ── */
        .plazas-meter {
            background: var(--bg);
            border-radius: 10px;
            padding: 12px;
            margin-top: 4px;
        }

        .plazas-meter-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .plazas-disponibles {
            font-size: 22px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .plazas-label {
            font-size: 12px;
            color: var(--text2);
            font-weight: 500;
        }

        .plazas-total {
            font-size: 12px;
            color: var(--text2);
        }

        .bar-track {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width .4s ease;
        }

        .bar-fill.libre   { background: linear-gradient(90deg, #0d9e6e, #38bdf8); }
        .bar-fill.pocos   { background: linear-gradient(90deg, #f59e0b, #ef4444); }
        .bar-fill.lleno   { background: #dc2626; }

        .estado-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
        }

        .estado-pill.libre  { background: var(--greenb); color: var(--green); }
        .estado-pill.pocos  { background: var(--amberb); color: var(--amber); }
        .estado-pill.lleno  { background: var(--redb);   color: var(--red); }

        .turno-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        /* ── BOTÓN AÑADIR ── */
        .add-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 160px;
        }

        /* ── BTN ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 16px;
            border: none;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s, transform .15s, box-shadow .15s;
        }

        .btn:active { transform: scale(.97); }

        .btn-primary {
            background: linear-gradient(135deg, var(--teal2), #0077b6);
            color: white;
            box-shadow: 0 3px 12px rgba(0,150,199,.3);
        }

        .btn-primary:hover { opacity: .9; box-shadow: 0 6px 18px rgba(0,150,199,.4); }

        .btn-ghost {
            background: var(--bg);
            color: var(--text2);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover { background: var(--border); }

        .btn-danger {
            background: var(--redb);
            color: var(--red);
            border: 1px solid var(--red)22;
        }

        .btn-danger:hover { opacity: .85; }

        .btn-wide { width: 100%; justify-content: center; padding: 13px; font-size: 15px; }

        /* ── DASHBOARD ── */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        @media (min-width: 480px) {
            .kpi-row { grid-template-columns: repeat(4, 1fr); }
        }

        .kpi-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }

        .kpi-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text2);
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 30px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            background: linear-gradient(135deg, var(--navy2), var(--teal2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── FILTERS ── */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
        .filter-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text2); }
        .filter-group select,
        .filter-group input[type="date"] {
            padding: 9px 12px;
            border: 2px solid var(--border);
            border-radius: 9px;
            font-size: 13px;
            background: var(--card);
            color: var(--text);
        }

        /* ── TABLA ── */
        .table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); }

        table {
            width: 100%;
            min-width: 540px;
            border-collapse: collapse;
            background: var(--card);
        }

        thead tr {
            background: var(--navy);
            color: rgba(255,255,255,.85);
        }

        th {
            padding: 12px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .6px;
            white-space: nowrap;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--bg); }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .pill-green  { background: var(--greenb); color: var(--green); }
        .pill-amber  { background: var(--amberb); color: var(--amber); }
        .pill-red    { background: var(--redb);   color: var(--red); }

        .mini-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 5px; min-width: 60px; }
        .mini-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #0d9e6e, #f59e0b 60%, #dc2626); }

        .row-actions { display: flex; gap: 6px; }

        /* ── HISTORIAL ── */
        .hist-list { display: flex; flex-direction: column; gap: 10px; }

        .hist-item {
            background: var(--card);
            border-radius: 10px;
            padding: 14px;
            border-left: 4px solid var(--teal);
            box-shadow: var(--shadow);
        }

        .hist-accion { font-weight: 700; font-size: 14px; }
        .hist-detalle { font-size: 13px; color: var(--text2); margin-top: 3px; }
        .hist-fecha { font-size: 11px; color: var(--text2); margin-top: 5px; opacity: .7; }

        /* ── MODAL ── */
        .modal {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,.55);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
            padding: 0;
        }

        @media (min-width: 480px) {
            .modal { align-items: center; padding: 20px; }
        }

        .modal.active { display: flex; }

        .modal-box {
            background: var(--card);
            border-radius: 20px 20px 0 0;
            padding: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow2);
        }

        @media (min-width: 480px) {
            .modal-box { border-radius: 20px; }
        }

        .modal-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 18px; }

        .modal-fields { display: flex; flex-direction: column; gap: 12px; }

        .modal-field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text2);
            margin-bottom: 5px;
        }

        .modal-field input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: 9px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            transition: border-color .2s;
        }

        .modal-field input:focus { outline: none; border-color: var(--teal); background: var(--card); }

        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns .btn { flex: 1; justify-content: center; }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--navy);
            color: white;
            padding: 11px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: var(--shadow2);
            opacity: 0;
            transition: opacity .3s, transform .3s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 2000;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── INSTALL BTN ── */
        #installBanner {
            display: none;
            background: linear-gradient(135deg, var(--teal2), #0077b6);
            color: white;
            padding: 12px 16px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        #installBanner.visible { display: flex; }

        #installBanner button {
            background: white;
            color: var(--navy);
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        #installBanner .close-banner {
            background: transparent;
            color: white;
            margin-left: 4px;
            padding: 6px 8px;
            opacity: .7;
        }

        /* ── EMPTY TABLE ── */
        .table-empty {
            text-align: center;
            padding: 40px;
            color: var(--text2);
            font-size: 14px;
        }

        /* ── NAV BOTTOM (mobile) ── */
        @media (max-width: 600px) {
            .app-header { padding-bottom: 32px; }
            .tabs-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: var(--card); border-top: 1px solid var(--border); padding: 4px 8px env(safe-area-inset-bottom); box-shadow: 0 -4px 20px rgba(0,0,0,.08); }
            .inner { padding-bottom: 120px; }
        }
    </style>
</head>
<body>

<div id="installBanner">
    ⚡ Instala esta app en tu dispositivo
    <button onclick="installApp()">Instalar</button>
    <button class="close-banner" onclick="document.getElementById('installBanner').classList.remove('visible')">✕</button>
</div>

<header class="app-header">
    <div class="header-inner">
        <div class="header-icon">⛵</div>
        <div class="header-text">
            <h1>Rutas en Barco</h1>
            <p>Control de plazas en tiempo real</p>
        </div>
    </div>
</header>

<nav class="tabs-bar" id="tabsBar">
    <button class="tab-btn active" onclick="cambiarTab('angel', this)">
        <span class="tab-icon">✏️</span>
        Actualizar
    </button>
    <button class="tab-btn" onclick="cambiarTab('edu', this)">
        <span class="tab-icon">📊</span>
        Control
    </button>
    <button class="tab-btn" onclick="cambiarTab('historial', this)">
        <span class="tab-icon">📋</span>
        Historial
    </button>
</nav>

<!-- TAB ÁNGEL -->
<div id="angel" class="content active">
    <div class="inner">
        <p class="section-title">Actualizar plazas</p>

        <div class="date-row">
            <label for="fechaInput">Fecha</label>
            <input type="date" id="fechaInput" class="date-input">
        </div>

        <div id="horariosList" class="turnos-grid"></div>

        <button class="btn btn-ghost btn-wide" onclick="resetFecha()" style="margin-top:8px;">
            Limpiar
        </button>
    </div>
</div>

<!-- TAB EDU -->
<div id="edu" class="content">
    <div class="inner">
        <p class="section-title">Dashboard</p>

        <div class="kpi-row">
            <div class="kpi-card"><div class="kpi-label">Rutas</div><div class="kpi-value" id="kpiRutas">0</div></div>
            <div class="kpi-card"><div class="kpi-label">Disponibles</div><div class="kpi-value" id="kpiDisp">0</div></div>
            <div class="kpi-card"><div class="kpi-label">Ocupadas</div><div class="kpi-value" id="kpiOcup">0</div></div>
            <div class="kpi-card"><div class="kpi-label">Ocupación</div><div class="kpi-value" id="kpiTasa">0%</div></div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>Fecha</label>
                <input type="date" id="filtroFecha" onchange="renderTabla()">
            </div>
            <div class="filter-group">
                <label>Estado</label>
                <select id="filtroEstado" onchange="renderTabla()">
                    <option value="">Todas</option>
                    <option value="libre">Con plazas</option>
                    <option value="pocos">Pocos huecos (≤3)</option>
                    <option value="lleno">Lleno</option>
                </select>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Horario</th>
                        <th>Barcos</th>
                        <th>Libre / Total</th>
                        <th>Ocupación</th>
                        <th>Estado</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tablaBody">
                    <tr><td colspan="7" class="table-empty">Cargando…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- TAB HISTORIAL -->
<div id="historial" class="content">
    <div class="inner">
        <p class="section-title">Historial de cambios</p>
        <div id="histList"></div>
    </div>
</div>

<!-- MODAL EDITAR -->
<div id="editModal" class="modal" onclick="if(event.target===this)cerrarModal()">
    <div class="modal-box">
        <h2>Editar turno</h2>
        <div class="modal-fields">
            <div class="modal-field">
                <label>Fecha</label>
                <input type="text" id="mFecha" readonly style="opacity:.6;">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <div class="modal-field">
                    <label>Inicio</label>
                    <input type="time" id="mInicio">
                </div>
                <div class="modal-field">
                    <label>Fin</label>
                    <input type="time" id="mFin">
                </div>
            </div>
            <div class="modal-field">
                <label>Nº barcos (1-2)</label>
                <input type="number" id="mBarcos" min="1" max="2">
            </div>
            <div class="modal-field">
                <label>Plazas ocupadas</label>
                <input type="number" id="mOcupadas" min="0">
            </div>
        </div>
        <div class="modal-btns">
            <button class="btn btn-primary" onclick="guardarEdicion()">Guardar</button>
            <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ── CONSTANTES ──
const PLAZAS_POR_BARCO = 12;
const PLANTILLA = [
    { horaInicio:'09:00', horaFin:'11:00' },
    { horaInicio:'11:00', horaFin:'13:00' },
    { horaInicio:'13:00', horaFin:'15:00' },
    { horaInicio:'16:00', horaFin:'18:00' },
    { horaInicio:'18:00', horaFin:'20:00' },
];

// ── ESTADO ──
let rutasData = [];
let historial  = [];
let editId     = null;

function genId() { return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

// ── STORAGE ──
function cargar() {
    try { const d = localStorage.getItem('rutasData'); if (d) rutasData = JSON.parse(d); } catch(e) { rutasData = []; }
    try { const h = localStorage.getItem('histData');  if (h) historial  = JSON.parse(h);  } catch(e) { historial = []; }
    migrar();
}

function guardar() {
    localStorage.setItem('rutasData', JSON.stringify(rutasData));
    localStorage.setItem('histData',  JSON.stringify(historial));
}

function migrar() {
    rutasData.forEach(r => {
        if (!r.id) r.id = genId();
        if (!r.horaInicio && r.hora) {
            const p = r.hora.split('-');
            r.horaInicio = p[0] || '09:00';
            r.horaFin    = p[1] || '11:00';
            delete r.hora;
        }
    });
}

function logHistorial(accion, detalles) {
    historial.unshift({ fecha: new Date().toLocaleString('es-ES'), accion, detalles });
    if (historial.length > 100) historial.pop();
    guardar();
}

// ── TOAST ──
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2400);
}

// ── TAB ──
function cambiarTab(id, btn) {
    document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if (id === 'edu') renderDashboard();
    if (id === 'historial') renderHistorial();
}

// ── ÁNGEL: FORMULARIO ──
function initAngel() {
    const hoy = new Date().toISOString().split('T')[0];
    const inp = document.getElementById('fechaInput');
    inp.value = hoy;
    inp.addEventListener('change', renderFormulario);
    renderFormulario();
}

function renderFormulario() {
    const fecha = document.getElementById('fechaInput').value;
    if (!fecha) return;

    const turnos = rutasData
        .filter(r => r.fecha === fecha)
        .sort((a, b) => a.horaInicio.localeCompare(b.horaInicio));

    let html = '';

    if (turnos.length === 0) {
        html += `
            <div class="empty-state" style="grid-column:1/-1">
                <p>No hay turnos para este día todavía.</p>
                <button class="btn btn-primary" onclick="usarPlantilla('${fecha}')">
                    ⚡ Crear turnos estándar
                </button>
            </div>`;
    }

    turnos.forEach(r => {
        const cap  = r.barcos * PLAZAS_POR_BARCO;
        const lib  = cap - r.ocupadas;
        const pct  = Math.round((r.ocupadas / cap) * 100);
        const cls  = lib === 0 ? 'lleno' : lib <= 3 ? 'pocos' : 'libre';
        const label = lib === 0 ? '✕ Lleno' : lib <= 3 ? '⚠ Pocos huecos' : '✓ Disponible';
        const fillCls = cls;

        html += `
        <div class="turno-card">
            <div class="turno-card-head">
                <span class="turno-hora">${r.horaInicio} – ${r.horaFin}</span>
                <span class="turno-barcos-badge">🚤 ${r.barcos} barco${r.barcos>1?'s':''}</span>
            </div>
            <div class="turno-body">
                <div class="field-row">
                    <div class="field-group">
                        <label>Inicio</label>
                        <input type="time" value="${r.horaInicio}"
                            onchange="updateCampo('${r.id}','horaInicio',this.value)">
                    </div>
                    <div class="field-group">
                        <label>Fin</label>
                        <input type="time" value="${r.horaFin}"
                            onchange="updateCampo('${r.id}','horaFin',this.value)">
                    </div>
                </div>
                <div class="field-row">
                    <div class="field-group">
                        <label>Nº barcos</label>
                        <input type="number" min="1" max="2" value="${r.barcos}"
                            onchange="updateCampo('${r.id}','barcos',this.value)">
                    </div>
                    <div class="field-group">
                        <label>Ocupadas</label>
                        <input type="number" min="0" max="${cap}" value="${r.ocupadas}"
                            onchange="updateCampo('${r.id}','ocupadas',this.value)">
                    </div>
                </div>
                <div class="plazas-meter">
                    <div class="plazas-meter-top">
                        <div>
                            <div class="plazas-disponibles" style="color:${cls==='libre'?'var(--green)':cls==='pocos'?'var(--amber)':'var(--red)'}">${lib}</div>
                            <div class="plazas-label">plazas libres</div>
                        </div>
                        <div class="plazas-total">de ${cap} total</div>
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill ${fillCls}" style="width:${pct}%"></div>
                    </div>
                    <span class="estado-pill ${cls}">${label}</span>
                </div>
                <div class="turno-actions">
                    <button class="btn btn-danger" onclick="eliminarTurno('${r.id}')">✕ Borrar turno</button>
                </div>
            </div>
        </div>`;
    });

    html += `
        <div class="add-card">
            <button class="btn btn-primary" onclick="agregarTurno('${fecha}')">＋ Añadir turno</button>
        </div>`;

    document.getElementById('horariosList').innerHTML = html;
}

async function usarPlantilla(fecha) {
    PLANTILLA.forEach(t => {
        rutasData.push({ id: genId(), fecha, horaInicio: t.horaInicio, horaFin: t.horaFin, barcos: 1, ocupadas: 0 });
    });
    logHistorial('Turnos creados', `${fecha}: 5 turnos estándar`);
    toast('Turnos estándar creados ✓');
    renderFormulario();
}

async function agregarTurno(fecha) {
    const ini = prompt('Hora de inicio (ej: 10:00):', '09:00');
    if (!ini) return;
    const fin = prompt('Hora de fin (ej: 12:00):', '11:00');
    if (!fin) return;
    rutasData.push({ id: genId(), fecha, horaInicio: ini, horaFin: fin, barcos: 1, ocupadas: 0 });
    logHistorial('Turno añadido', `${fecha}: ${ini}-${fin}`);
    toast('Turno añadido ✓');
    renderFormulario();
}

async function eliminarTurno(id) {
    const r = rutasData.find(x => x.id === id);
    if (!r || !confirm(`¿Borrar el turno ${r.horaInicio}-${r.horaFin}?`)) return;
    rutasData = rutasData.filter(x => x.id !== id);
    logHistorial('Turno borrado', `${r.fecha}: ${r.horaInicio}-${r.horaFin}`);
    toast('Turno borrado');
    renderFormulario();
}

async function updateCampo(id, campo, valor) {
    const r = rutasData.find(x => x.id === id);
    if (!r) return;
    const ant = r[campo];
    r[campo] = (campo === 'barcos' || campo === 'ocupadas') ? parseInt(valor) : valor;
    const cap = r.barcos * PLAZAS_POR_BARCO;
    if (r.ocupadas > cap) r.ocupadas = cap;
    logHistorial(`Actualización`, `${r.fecha} ${r.horaInicio}-${r.horaFin}: ${campo} ${ant}→${r[campo]}`);
    toast('Guardado ✓');
    renderFormulario();
}

function resetFecha() {
    document.getElementById('fechaInput').value = new Date().toISOString().split('T')[0];
    renderFormulario();
}

// ── EDU: DASHBOARD ──
function renderDashboard() {
    let totalR=0, totalO=0, totalD=0;
    rutasData.forEach(r => {
        totalR++;
        totalO += r.ocupadas;
        totalD += (r.barcos * PLAZAS_POR_BARCO) - r.ocupadas;
    });
    const cap = rutasData.reduce((s,r) => s + r.barcos * PLAZAS_POR_BARCO, 0);
    const tasa = cap > 0 ? Math.round((totalO / cap) * 100) : 0;

    document.getElementById('kpiRutas').textContent = totalR;
    document.getElementById('kpiDisp').textContent  = totalD;
    document.getElementById('kpiOcup').textContent  = totalO;
    document.getElementById('kpiTasa').textContent  = tasa + '%';

    renderTabla();
}

function renderTabla() {
    const ff = document.getElementById('filtroFecha').value;
    const fe = document.getElementById('filtroEstado').value;

    let rows = rutasData.filter(r => {
        if (ff && r.fecha !== ff) return false;
        const cap = r.barcos * PLAZAS_POR_BARCO;
        const lib = cap - r.ocupadas;
        if (fe === 'libre'  && lib === 0)  return false;
        if (fe === 'lleno'  && lib > 0)    return false;
        if (fe === 'pocos'  && lib > 3)    return false;
        return true;
    }).sort((a,b) => a.fecha.localeCompare(b.fecha) || a.horaInicio.localeCompare(b.horaInicio));

    const tbody = document.getElementById('tablaBody');

    if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="table-empty">Sin resultados</td></tr>';
        return;
    }

    tbody.innerHTML = rows.map(r => {
        const cap  = r.barcos * PLAZAS_POR_BARCO;
        const lib  = cap - r.ocupadas;
        const pct  = Math.round((r.ocupadas / cap) * 100);
        const cls  = lib===0 ? 'red' : lib<=3 ? 'amber' : 'green';
        const lbl  = lib===0 ? '✕ Lleno' : lib<=3 ? '⚠ Pocos' : '✓ Libre';
        const fecha = (() => {
            const d = new Date(r.fecha + 'T12:00:00');
            return d.toLocaleDateString('es-ES', { weekday:'short', day:'numeric', month:'short' });
        })();
        return `
        <tr>
            <td><strong>${fecha}</strong></td>
            <td style="white-space:nowrap">${r.horaInicio} – ${r.horaFin}</td>
            <td>${r.barcos}</td>
            <td style="white-space:nowrap"><strong>${lib}</strong> / ${cap}</td>
            <td>
                <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
                <span style="font-size:11px;color:var(--text2)">${pct}%</span>
            </td>
            <td><span class="pill pill-${cls}">${lbl}</span></td>
            <td>
                <div class="row-actions">
                    <button class="btn btn-ghost" style="padding:6px 10px;font-size:12px" onclick="abrirModal('${r.id}')">Editar</button>
                    <button class="btn btn-danger" style="padding:6px 10px;font-size:12px" onclick="eliminarRuta('${r.id}')">✕</button>
                </div>
            </td>
        </tr>`;
    }).join('');
}

async function eliminarRuta(id) {
    const r = rutasData.find(x => x.id === id);
    if (!r || !confirm('¿Eliminar esta ruta?')) return;
    rutasData = rutasData.filter(x => x.id !== id);
    logHistorial('Eliminada', `${r.fecha} ${r.horaInicio}-${r.horaFin}`);
    toast('Ruta eliminada');
    renderDashboard();
}

// ── MODAL ──
function abrirModal(id) {
    const r = rutasData.find(x => x.id === id);
    if (!r) return;
    editId = id;
    document.getElementById('mFecha').value    = r.fecha;
    document.getElementById('mInicio').value   = r.horaInicio;
    document.getElementById('mFin').value      = r.horaFin;
    document.getElementById('mBarcos').value   = r.barcos;
    document.getElementById('mOcupadas').value = r.ocupadas;
    document.getElementById('editModal').classList.add('active');
}

function cerrarModal() {
    document.getElementById('editModal').classList.remove('active');
    editId = null;
}

async function guardarEdicion() {
    const r = rutasData.find(x => x.id === editId);
    if (!r) return;
    r.horaInicio = document.getElementById('mInicio').value;
    r.horaFin    = document.getElementById('mFin').value;
    r.barcos     = parseInt(document.getElementById('mBarcos').value);
    r.ocupadas   = parseInt(document.getElementById('mOcupadas').value);
    const cap = r.barcos * PLAZAS_POR_BARCO;
    if (r.ocupadas > cap) r.ocupadas = cap;
    logHistorial('Edición manual', `${r.fecha} ${r.horaInicio}-${r.horaFin}`);
    cerrarModal();
    toast('Guardado ✓');
    renderDashboard();
}

// ── HISTORIAL ──
function renderHistorial() {
    const el = document.getElementById('histList');
    if (historial.length === 0) {
        el.innerHTML = '<p style="color:var(--text2);font-size:14px;text-align:center;padding:32px">Sin cambios registrados</p>';
        return;
    }
    el.innerHTML = `<div class="hist-list">${historial.map(h => `
        <div class="hist-item">
            <div class="hist-accion">${h.accion}</div>
            <div class="hist-detalle">${h.detalles}</div>
            <div class="hist-fecha">${h.fecha}</div>
        </div>`).join('')}</div>`;
}

// ── PWA ──
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.add('visible');
});

function installApp() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('installBanner').classList.remove('visible');
    });
}

window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').classList.remove('visible');
});

// ── INIT ──
window.addEventListener('load', () => {
    cargar();
    initAngel();
    renderDashboard();
});
</script>
</body>
</html>
